body:
  text: 道德眞經集解序說短五史記列傳曰老子者楚苦縣瀨鄉曲仁里人也苦音怙縣本屬陳因楚滅陳故屬楚即今之亳州眞源縣也瀨或作厲杜云瀨水出其西故以名鄉姓李氏名耳字伯陽謚曰聃周守藏室之史也孔子蓋嘗適周問禮焉禮記曾子問鄭氏註曰老聃古壽考者之號與孔子同時疏云老聃即老子也說文云聃耳曼也後漢竇章傳註云老子爲守藏史復爲柱下史道藏玄妙玉女内傳其略云玉女自九天降爲天水尹氏女適李靈飛老君於殷陽甲十七年乘日精化流珠入玉女口中己而孕歷八十一年以武丁九年降誕文王爲西伯時召爲守藏史故論語鄭玄註云老彭商之賢大夫也疏云老是老聃也武王時遷爲柱下史成康之時尚爲柱史昭王時乃去官故魏明帝贊云爲周柱史經九百年唐博士吴楊昊云旣生商日復仕周時計其始終乃歷千載此皆舉其成數也按實録云自商武丁九年至周赧王九年升崑崙還紫微上宫之時計九百九十六年史記曰或云百六十歲或云老子在周二百餘年乃入流沙此以孔子時人斟酌其歲數不能知其實所以每事言蓋言或又云莫知所終故家語云孔子謂南宫敬叔曰吾聞老聃博古知今通禮樂之原明道德之歸則吾師也今將往矣有良賈深藏若虚君子盛德容貌若愚等語於是孔子發猶龍之歎按混元實録昭王時出關穆王元年還中夏平王東遷復出關至西海校仙再還中夏此問禮及五行等事乃敬王十七年也老子居周乆之不得以行其道乃去周尋欲西化異俗至函谷關關令尹喜曰子將隱矣彊爲我著書於是老子乃著書上下篇言道德之意五千餘言而去莫知所終尹喜字公文盩厔縣神龍鄉聞仙里人也少好墳索善天文祕緯嘗結草爲樓仰觀乾象康王朝爲大夫後召爲東宫賔友昭王時因瞻紫炁西邁天文顯瑞知有聖人當度函谷關而西乃求出爲關令王從之至關乃曰夫陽數極九星宿值金歲月並王法應九十日外有大聖人經過京邑先敕關吏孫景曰若有形客殊俗車服異常者勿聽過喜預齋戒使掃道燒香以俟是時老君以昭王二十三年五月壬午駕青牛車薄版爲隆穹徐甲爲御將往開化西域至七月十二日甲子果有老人皓首聃耳乘白輿駕青牛至吏曰明府有教願翁少留乃入白喜即具朝服出迎叩頭邀之老君遜謝至三尹曰去冬十月天理星西行過昴今月朔融風三至東方眞炁狀如龍蛇而西度此大聖人之徵於是爲留官舍設座行弟子禮喜乃辭疾去官十二月二十五曰奉邀老君歸其家二十八日授以五千言至次年四月二十八日於南山阜辭决升天戒以千日外尋吾於青羊之肆至二十七年會於蜀李太官家是時諸天衆仙浮空而至老君乃敕五老上帝等授喜玉册金文賜號文始先生位爲無上眞人賜紫服芙蓉冠等從遊八絃之外也謂之老子者蓋生而白首亦以其脩道而養壽也道德經者其文載道德之㫖而可以常由也唐藝文志曰天寳中加號老子玄通道德經云葛玄序曰夫五千文宣道德之源大無不包細無不入天人之自然經也班固載老子傳說傅氏三十七篇鄰氏四篇徐氏六篇劉向四篇杜光庭云註者有尹喜内解漢張道陵想爾河上公章句嚴遵指歸魏王弼何晏郭象鍾會孫登晋羊祜裴處思苻堅時沙門羅什後趙佛圖澄晋僧肇梁陶弘景後魏盧景裕劉仁會南齊顧歡松靈仙人齊杜弼宋張憑梁武帝梁簡文帝張嗣梁道士臧玄靜孟安期孟智周竇略陳道士褚柔隋道士李播劉進喜唐魏徵傅奕楊上善賈至王光庭王眞仙人胡超道士宋文明尹文操韋録王玄辨尹愔徐邈何思遠薛季昌王鞮趙志堅車惠弼李榮黎元興張慧超龔法師任太玄申甫張道相成玄英符少明唐藝文志又有安丘望之湘逸其姓程韶王尚蜀才袁眞釋惠嚴惠琳義盈梁曠樹李允願陳嗣古馮廓玄景先生楊上器韓杜賈大隱辟閭仁諝劉仲融王肅戴詵元宗盧藏用邢南和馮朝隱白覆忠尹知章陸德明陳庭玉陸希聲吴善經孫思邈李含光凡四十家而藏中所存李約賈清夷王顧杜光庭等皆唐人且不著於志始知所録猶有未盡惜名存書亡者十蓋八九河上公分八十一章以應太陽之極數上經三十七章法天數奇下經四十四章法地數耦劉歆七略云劉向定著二篇八十一章上經三十四章下經四十七章而葛洪等又加損益乃云天以四時成故上經四九三十六章地以五行成故下經五九四十五章通應九九之數清源子劉驥曰矢口而言未嘗分爲九九章也嚴遵以陽九陰八相乘爲七十二上四十章下三十二章王弼合上下爲一篇亦不分章今世本多依河上章句或總爲上下篇廣川董逌云唐元宗旣註老子始改定章句言道者類之上卷言德者類之下卷刻石渦口廟中元宗釋題云道者德之體德者道之用經分上下者先明道而德次之然其末又云是知體用互陳遞明精要不必定名於上下也江袤云余昔於藏書家見古文老子次序先後與今篇章不倫亦頗疑後人析之也元宗命司馬子微三體寫本有五千三百八十字傅奕考覈衆本勘數其字云項羽妾本齊武平五年彭城人開妾塚得之安丘望之本魏太和中道士寇謙之得之河上丈人本齊處士仇嶽傳之三本有五千七百二十二字與韓非喻老相參又洛陽官本五千六百三十五字王弼本五千六百八十三字或零六百一十或三百五十五或五百九十多少不一史記云五千餘言但不滿六千則是矣今云五千文者舉全數也彭耜皇宋集註有政和御註道士陳景元司馬温公光蘇文定公轍王荆公安石王雱陸佃劉概劉涇仙姑曹道沖馬蹄山達眞子了一子李文惒陳象古葉夢得清源子劉驥朱文公熹黄茂材程文簡公大昌林東邵若愚而倪文節公思高士徐知常等註亦未盡録大抵老子之道以清淨無爲自然爲宗以虚明應物不滯爲用以慈儉謙下不爭爲行以無欲無事不先天以開人爲治其於治身治人者至矣如用之則太古之治可復也前漢藝文志云道家者流秉要執本清虚以自守卑弱以自持此君人南面之術也歐陽脩崇文總叙云本清虚去健羡泊然自守故曰我無爲而民自化我好靜而民自正雖聖人南面之治不可易也以其所值之時俗尚文勝淳朴之風無復存者而老子抱純素之道與時偕極必待感而後應故不得位以推是道於天下蓋知夫時數之有所忤也然終不能恝然於其道之無傳是以有教無類而且睠睠於西方之異俗則其憫當時慮後世之心何如哉猶幸斯文不墜故西關伺駕東魯見龍而書與言之尚存也河上丈人黄石公樂臣公蓋公之徒蓋能究其㫖而體之歛厥用於一身則在我之天下己羲皇矣及其道之有所授則孝文以之爲君子房以之佐漢曹參以之相齊果能通一脉於苛秦之後吁亦驗也然使又有進於是如其人羲皇之則羲皇矣或者見是書詞意含洪寬大而不知致察於虚極靜篤之時存乎體之至嚴至密者以爲庶政庶事之本乃徒務爲悶悶若昏之量而習弊反墮於優游姑息遂有清虚不及用之譏故不經而子視之嗚呼惜哉文中子曰清虚長而晋室亂非老子之罪也朱文公曰晋時諸公只是借他言語來蓋覆那滅棄禮法之行耳據其心下污濁紛擾如何理會得老子底意思舊唐書憲宗紀李藩對曰老子指歸與六經無異唐兵部郎李約云世傳此書爲神仙虚無言不知六經乃黄老之枝葉爾故太史公論大道則先黄老而後六經不爲無見也是經大義固已見於諸家然或病其無所折衷僕昏蒙晚學過不自量輒採摭諸說亦間出己見以補一二或詮其文或逗其意附以音釋訂以異同圖便觀覽庶曰益曰損而契言外之㫖於絶學無憂之地也或謂微言隱訣多寓其間故以首章有無爲在二丹則神炁水火也虚心實腹則煉鈆之㫖用兵善戰則採鈆之方沖字從水從中乃喻氣中眞一之水三十輻共一轂爲取五藏各有六氣之象及準一月火符之數如斯等義今皆略之或者蓋謂無者地二之火有者天一之水故舉濳通訣云兩無宗一有靈化妙難窺及以知白守黑爲金水之說然此乃大丹之法準易象法天地以日魂月魄爲藥物則神農古文龍虎上經三十六字西漢淮陽王縯金碧要㫖經東漢魏伯陽參同契唐元陽子金碧潛通訣等是其法也如混元實録云老君先授尹眞内外二丹之術然後告以道德之㫖則是不以丹術雜於本經明矣又曰三一九思内修之要也九丹金液外煉之極也故所授太清諸經則專言金液外煉之事然與前所舉大丹之法亦少異後輩見其有壇爐鼎竈之設乃以靈砂金石等爲外丹殊不知後天有質陰雜非類之頑物服之令人多躁失明而且不悟其非也或者又曰無者神也有者炁也乃以有無交入爲丹本隱顯相符是水金及黑中有白爲丹母虚心實腹義俱深三十輻兮同一轂等詩爲證此雖皆用經中之語以爲訣然其說自成一宗蓋内丹之法也若尹眞所受三一九思等法雖曰内修之事然與内丹源流亦自不同大抵道法經術各有指歸不可以一書而兼盡諸家之義荀强引而合皆傅會也何則性由自悟術假師傳使其果寓微㫖亦必己成之士口授纖悉然後無惑區區紙上烏足明哉況是經標道德之宗暢無爲之㫖高超象外妙入環中遽容以他說小數雜之乎白樂天云元元皇帝五千言不言藥不言仙不言白曰升青天亦确論也蘇文忠公軾奉詔撰儲祥宫碑其大略云道家者流本出於黄帝老子其道以清靜無爲爲宗以虚明應物爲用以儉慈不爭爲行合於易何思何慮論語仁者靜壽之說自奏漢以來始用方士言乃有飛仙變化之術黄庭大洞之法木公金母之號太乙紫微之祀下至於丹藥奇技符籙小數皆歸於道家嘗竊論之黄帝老子之道本也方士之言末也得其本而末自至噫修之身其德眞以至天下其德乃普非二本也學者果能得一而有以貫通則所謂杳冥之精恍惚之妙實昭然於守中抱一之中而玄牝之機橐籥之用莫非道之所爲也惟深造自得者知之淳祐丙午臘月望清源天慶觀後學圭山董思靖書
