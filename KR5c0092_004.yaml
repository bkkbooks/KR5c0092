body:
  text: 後學董思靖集解治人事天莫若嗇嗇音色乃嗇省精神而有斂藏貞固之意學者久於其道則心廣氣充而有以達乎天德之全所謂至誠為能盡己之性而後能盡人之性乃至與天地參矣蓋天人一理了無間然孟氏云存心養性所以事天是也夫惟嗇是以早復早復謂之重積德重去聲再也文公曰早復者言能嗇則不遠而復重積德者言先已有所積復養以嗇是又加積之也如修養者早覺未損失而便嗇之也重積德則無不克無不克則莫知其極惟德可以勝物故已私盡克則其分量不可窮極矣莫知其極可以有國德量如此則可以兼容天下矣有國之母可以長久民之附德猶子慕母蓋國之本在身身有其道則可長久若以身為國則母即雌一之根柢而性命之常雖生死不能變故曰長久是謂深根固柢長生久視之道柢丁計切御注曰與天地為常故能長生與日月參光故能久視文定曰以嗇治人則可以有國以嗇事天則深根固柢古之聖人保其性命之常不以外耗內則根深柢固而不可拔雖長生久視可也蓋治人事天雖有內外之異而莫若嗇則一也程伊川曰修養之所以引年國祚之所以祈天永命常人之至於聖賢皆工夫到這裏則有此應矣右五十九章河上名守道此章明用嗇之道治人則國祚延事天則壽長久治大國若烹小鮮烹普庚切煮也鮮音仙魚也謂不可撓也以道蒞天下者其鬼不神非其鬼不神其神不傷人非其神不傷人聖人亦不傷民夫兩不相傷故德交歸焉蒞力至切臨也所感之機莫不由我是以聖人無為而人各安其自然外無所求內無所畏則陰陽和而萬物理故鬼亦無所用其神非其鬼之不神其神不傷乎人非神不傷人以其聖人不傷於民所以鬼神莫不感其德化惟兩者交悅衆德交歸乃為至德之治矣列子之論聖治至於物無疵癘鬼無靈響亦此意也文公曰若是王道修明則此等不正之氣都消鑠了右六十章河上名居位此章明用道則德交歸大國者下流如江海必處衆流之下也文定曰天下之歸大國猶衆水之趨下流也天下之交天下之牝牝常以靜勝牡以靜為下故大國以下小國則取小國小國以下大國則取大國故或下以取或下而取牝婢忍切釋畜母也牡音某畜父也大國以下及或下以取之下音暇自上而下也小國以下及或下而取之下如字上聲本在物下也交謂交會而歸聚也牝者雌靜柔下之德牡者雄動強高之屬靜以攝動柔之勝強事物皆然則靜而下乃常勝之道故為衆之所歸即守雌為天下溪之義也以取者大國能下則終取小國而兼有之而取者小國能下則為大國所取悅而容受之終則大國之民且樂歸之如西伯善養老而盍歸乎來之類葉夢得曰取之為言得其所欲之謂也黃曰大國下小國湯事葛也小國下大國句踐事吳也大國不過欲兼畜人小國不過欲入事人兩者各得其所欲故大者宜為下其所以為下者不過欲畜人事人耳初非計利而後然也故欲兩者各遂其理事之所安則大者宜能下使小者自歸之矣易於大有之後必繼之以謙者乃所以全其大也右六十一章河上名謙德此章明以德下人人交歸之清源子曰身則國之象也身之虛而萬物至心之無而和氣歸所謂守雌抱一則是陽下煉陰化為純陽乃無為之妙也此亦一義道者萬物之奧奧於到切釋文云室之西南隅曰奧謂深邃如堂奧也蓋道體混然其大無外萬物莫不藴於其中而資給焉其小無內亦莫不皆在萬物之中而不可見故西升經云道深甚奧虛無之淵善人之寶不善人之所保人雖不善然亦莫不賴於道以有生故是所保也溫公曰善人守而用之不善人亦依於有道以自安美言可以市尊行可以加於人人之不善何棄之有行去聲蓋人莫不有是性雖下愚不能無道心則道豈遠人哉故至美之言市人所可共知至尊之行人人皆所與能苟或有人朝為不義使夕聞大道則妄盡性復雖欲指其不善不可得也是又安可棄哉惟善救之而已此不善人之所保也故立天子置三公雖有拱璧以先駟馬不如坐進此道先悉薦切拱璧合拱之璧美玉之大者駟馬者四馬為乘共駕一車也古者朝聘有贄幣之禮謂將進駟馬則以拱璧為先導也雖天子三公以勢為貴拱璧駟馬以物為貴亦不若安然坐進此道之為貴也道乃人之所固有則良貴也而三公拱璧是有命焉不可幸而致也人當致勉於性分之所固有而於外物之儻來者何足貴哉古之所以貴此道者何不曰求以得有罪可以免邪故為天下貴問所以貴此道之意蓋謂不求於外而求之在我則是求而有益於得也夫有志於道則無惡矣惟不假他求而自得故出乎禍福之外又為有人災之所能及乎此所以為天下貴或曰求以得則善人之寶有罪可以免則不善人之所保也右六十二章河上名為道此章言道為天下之至貴也為無為事無事味無味大小多少報怨以德夫涉於形則有大小係乎數則有多少大小之辨多少之分此怨之所由起也惟道非形數而上聖與之為一為出於無為事出於無事而味乎無味故含大虛於方寸而不以纖芥私欲自纍會萬有於一真而不為高下外境所遷是以物各付物事各付事而大小多少一以視之則愛惡妄除聖凡情盡亦奚怨之可報哉惟德以容之而已且使夫人之意也消譬如天地之無不覆載而化育之也然此則在常人之所最難惟切問近思漸而修之則亦可到其地矣下文乃修以求至之方也圖難於其易為大於其細天下之難事必作於易天下之大事必作於細夫道之在於起居食息之間而不遺可謂易矣及其至也惟聖人為獨能可謂難矣當思慮未發之中而漠然無朕可謂細矣而其充周也雖天地莫能窮其量可謂大矣故漸修而無一行之不謹及其德成則與聖人而同能謹微而無一毫之不盡至全乎道體則與天地而同量惟能愼於其始而毋忽於其終則難者可以成大者可以全矣若以怨言之則人之怨亦莫不由小以成大及乎怨愈深而忘愈難茍能於起處照徹根原則當下寂然矣是以聖人終不為大故能成其大學者固當弘毅以立其志然最不可先存為大之心苟存是心則必有躐等自矜之患適所以障道是不能為乎無為事乎無事味乎無味矣惟聖人為能無我故其心常小所以能成其大夫輕諾必寡信多易必多難惟其粗而不精故言之不訒而行必不符忽易之心生其於道必難至矣是以聖人猶難之故終無難矣聖人生知安行固不待勉而後能然豈忽之乎哉蓋德量平等齊小大一多少無所不謹無所不難故終無難濟之事也此又致勉乎學者不可有一毫忽易之心則為之勇守之固愼終如始故亦無難矣右六十三章河上名恩始此章明聖人得道之大全也其安易持其未兆易謀其脆易泮其微易散為之於未有治之於未亂脆此芮切脆嫩易斷貌謂嗜欲未堅也泮冰釋貌此亦承上章之意謂存之於未萌之時則渾乎自然矣故曰易持易謀察之於始萌之際則不遠而復矣故曰易泮易散未有乃無思無為之時也未亂乃方行而未汨之時也為之治之於此時則無所用力而功成矣然理由頓悟乘悟頓消行非頓成漸修乃至故下文則養德之事也合抱之木生於毫末九層之臺起於纍土千里之行始於足下此設諭之辭也謂當志立乎事物之表而敬行乎事物之內致知力行趨實務本不遺於細微不忽於卑近修以縝密養以悠久則庶乎小者可以大下者可以高而遠者可以到矣然於此苟有一毫謀利計功之心先入則於道反為無補故下又歷陳之也為者敗之執者失之是以無為故無敗無執故無失民之從事常於幾成而敗之愼終如始則無敗事矣幾平聲蓋天理精微智力之私無與焉故用意者有為少懈者敗事惟守之以自然則真積力久而德自成矣是以聖人欲不欲不貴難得之貨學不學復衆人之所過以輔萬物之自然而不敢為夫道無欲也所謂欲者求其在我而已不欲外物之為貴也無為真學也不以博溺心之為學也但反其衆人情欲之過以復其初耳蓋此道初非外求而聖人亦不能為物作則也且夫萬物莫不有箇自然之道聖人惟順其性命之理而立教以左右之使適乎中而已不敢别有益生助長之為也右六十四章河上名守微此章贊聖人無為之學以怯有為有執之失古之善為道者非以明民將以愚之民可使由之不可使知之蓋不先天以開人反朴之謂愚民之難治以其智多故以智治國國之賊不以智治國國之福知此兩者亦楷式兩者謂用智與不用智也知乎此亦可以為楷模法式矣能知楷式是謂玄德玄德深矣遠矣與物反矣然後乃至大順人能知此其德可謂玄矣雖以小智近情察之若相反然然反於物乃順於道則其為順也大矣右六十五章河上名淳德此章明用智啓姦之惑示玄德大順之規此老子逆知世變之必至其有憂患之心乎江海所以能為百谷王者以其善下之故能為百谷王是以聖人欲上人以其言下之欲先人以其身後之是以處上而人不重處前而人不害是以天下樂推而不厭以其不爭故天下莫與之爭善下言下之下音暇樂音洛御注曰屯初九曰以貴下賤大得民也蓋得其心也處上而人不重則戴之也歡處前而人不害則利之者衆若是則無思不服故不厭也聖人隨時趨變以道豈計利哉亦德之謙而已矣德下之則形上矣德後之則形先矣楊雄曰自下者人高之自後者人先之故天下樂推戴而無厭斁之心此天道不爭之德也右六十六章河上名後己此章明善下不爭之德天下皆謂我道大似不肖夫惟大故似不肖若肖久矣其細也夫夫音扶若有所肖似則亦同於一物何足以為大西塘鄭俠曰道大而物小人之營營而卒乎小者纍於物也元者善之長而至於大之謂也至而不知其為大則同乎道而與世俗不相似故天下皆謂我道大似不肖我有三寶寶而持之一曰慈二曰儉三曰不敢為天下先夫慈故能勇仁者必有勇也儉故能廣守約而施博也不敢為天下先故能成器長長上聲後其身而身先故卒為有物之長乾之出庶物亦必曰見羣龍無首吉是三寶皆與世俗不肖似乃所以為大也今捨其慈且勇捨其儉且廣捨其後且先死矣捨其本而徇其末則易以窮故剛強夸大好進者皆死之徒也夫慈以戰則勝以守則固天將救之以慈衛之夫慈者生道之所以流行乃仁之用也故為三寶之首稱以慈御物物亦愛之如慕父母雖為之效死不辭是以戰則勝守則固故曰仁者無敵於天下也苟或人有所不及天亦將以慈而救衛之蓋出乎爾反乎爾而天道好還常與善人故也文簡曰去邠而岐周以興是其救也右六十七章河上名三寶此章明道體至大而用以慈善為士者不武不尚力也善戰者不怒不得已而戰非出於人欲之私善勝敵者不爭惟無爭之之心故能勝彼之爭貪先動者必敗善用人者為之下德之謙下則人樂與吾為用蓋心誠而願服其勞也是謂不爭之德是謂用人之力是謂配天古之極惟其不爭而為下則去智與故循天之理乃與天同德溫公曰德與天合自生民以來無以加也右六十八章河上名配天此章標四善以表合天之德用兵有言吾不敢為主而為客不敢進寸而退尺是謂行無行攘無臂仍無敵執無兵行上如字下户剛切文定曰造事曰主應敵曰客進者有意於爭退者無意於爭惟無意於爭則雖用兵與不用均也故難進而易退雖在軍旅之間如無行陳之可行無臂可攘無敵可因無兵可執而亦安有用兵之咎哉禍莫大於輕敵輕敵則幾喪吾寶故抗兵相加哀者勝矣幾平聲喪去聲失也抗舉也文定曰既以慈為寶故輕敵則輕戰輕戰則殺人是喪其所慈矣兩敵舉兵相加而吾出於不得已則有哀愍殺傷之心哀心見而天人助之雖欲不勝不可得矣右六十九章河上名玄用此章假用兵以明道而貴在於守慈也或云若以人身言之則邪念多於敵國利欲勝於鋒銛蓋亦寡欲以至於無欲以全其所寶乎吾言甚易知甚易行而天下莫能知莫能行性本固有人所同然指此示人宜若無難知難行之事然天理渾然茍差之一毫則謬以千里以其非計度之所能明故用意者過之忘懷者不及所以莫能知以其非步驟之所能至故邀近功者好捷徑力不足者廢半塗所以莫能行言有宗事有君言者道之詮事者道之迹不言之教事於無事乃其宗與君乎此沉言滯迹者之所以莫能知莫能行也夫惟無知是以不吾知也文定曰古之聖人無思無為而有漠然不自知者存焉此則思慮之所不及是以終莫吾知也知我者希則我貴矣溫公曰道大故知之者鮮是以聖人被褐懷玉御注曰聖人藏于天而不自衒鬻清源子曰被褐則和光同塵懷玉則抱道藴德文簡曰褐者日用之不可無舉世之所共也玉者至貴之貨我所獨有也知我者希固足以見吾道之上矣而聖人不以自異也故其聖而不可知之妙亦何嘗不顯諸日用共由之間蓋以期乎人之皆能也此孔子所謂吾無隱乎爾者也右七十章河上名知難此章明道至易知易行而忽之則至難知不知上矣不知知病矣惟其真知則與道為一故不滯於知此德之上也若夫不到真知之地而自己謂之知則必以文滅質以博溺心欲強知之乃德之病也夫惟病病是以不病聖人之不病以其病病是以不病夫惟知其病之為病是以不落於病也聖人則生而知之本自不病不待病其病然後至不病之地所謂以其病病者乃以其病病之藥示乎學者使之病其強知之病而了悟真知以遣其病則藥病齊祛能所俱泯始知從來元自不病則與聖人同矣右七十一章河上名知病此章謂真知則契理執迷則成病民不畏威則大威至矣夫人自有至大至剛者充塞乎天地實高明光大赫然物莫能加此所謂大威也惟人梏於形器之私溺於衆妄之迷畏生死憚得喪於是萬物之威雜然乘之故終身惴栗有是大威而不自知也苟誠知之一生死齊得喪勇往直前力行不顧則此大威燁然見前矣無狹其所居無厭其所生夫惟不厭是以不厭狹胡夾切隘也厭於艷切棄也無當作毋居者性之地居天下之廣居則與太虛同其體矣生者氣之聚含太一之至精則與造化同其用矣惟曲士不可以語道茍不溺於小術而實諸所無以自狹其居則必棄有著無而蔽於斷滅以厭其所生矣是以告之以無狹無厭使學者知夫性者氣之帥而其大無量當擴而充之以全其大生者道之寓而其用不窮當葆而養之以致其用則養氣全生盡性至命而不生厭慕之心所以體無非強無而無非頑也長生非貪生而生非礙也夫如是則生與道居而道亦未嘗厭棄於人矣是以聖人自知不自見自愛不自貴故去彼取此見賢遍切顯也去上聲自知則返照無畏而不狹其居自愛則絶外嗜欲而不厭其生惟自知自愛所以居之安也而不自見以矜能不自貴以賤物故無知之之見忘愛之之心也文定曰雖自知之而不自見以示人雖自愛之而不自貴以眩人蓋恐人之有厭有慕也此心未忘則猶有畏也畏去而後大威至矣是以去彼自見自貴者而取此自知自愛者然聖人動靜皆天理無去取此開教引凡之説也右七十二章河上名愛己此章祛妄惑以全真也勇於敢則殺勇於不敢則活此兩者或利或害天之所惡孰知其故是以聖人猶難之惡去聲剛強者死之徒勇於此則殺也害也柔弱者生之理勇於此則活也利也此乃必然之定理也或有時而返常故云或利或害然強梁者殺之徒實為天之所惡也今偶然而未受其禍孰能知其故哉是以聖人猶難之列子曰迎天意揣利害不如其已是也雖然要其終而盡其變則未始少失故下文歷陳之溫公曰聖人於天道亦不敢易言之天之道不爭而善勝溫公曰任物自然而物莫能違不言而善應天何言哉四時行焉其於福善禍淫之應信不差矣不召而自來神之格思本無向背如暑往則寒來夫豈待召而後至哉坦然而善謀御注曰德行常易以知險天網恢恢疏而不失蓋要終盡變然後知其雖廣大而微細不遺也失或作漏右七十三章河上名任為此章告人當勇於道不當勇於力繼明天道之自然而末又戒以天網之不漏使人信之無疑也民常不畏死奈何以死懼之若使民常畏死而為奇者吾得執而殺之孰敢文定曰政煩刑重則民無所措其手足故常不畏死雖以死懼之無益也苟民安於政則常樂生畏死或有詭異亂羣者吾然後執而殺之孰敢不服哉常有司殺者殺而代司殺者殺是代大匠斫夫代大匠斫希有不傷其手矣文定曰司殺者天也理也方世之治而詭奇亂羣之人恣行於其間則天之所棄也因而殺之則是天殺之非我也否則是代司殺者殺矣夫代大匠斫則傷其手代司殺者殺則及其身矣程伊川謂德未成而先以功業為事者有類乎是右七十四章河上名制惑此章謂君無為則民知自勸之方右史張耒曰夫物不患無殺之者萬物泯泯必歸於滅盡而後止則常有司殺者殺矣竊司殺之常理而移之以行其畏非徒不足以懼物而亦有所不及者然則操政刑死生之柄驅一世之民使從之殆非也民之飢以其上食稅之多也是以飢民之難治以其上之有為也是以難治御注曰賦重則民不足政煩則姦偽滋起人之輕死以其生生之厚也是以輕死御注曰矜生太厚則欲利甚勤放僻邪侈無不為矣文定曰上以利欲先民民亦爭厚其生雖死而求利不厭惟無以生為者是賢於貴生也溫公曰外其身而身存也右七十五章河上名貪損此章戒有為之弊惟忘其生則可以全生也王弼注謂此章疑非老子所作人之生也柔弱其死也堅強草木之生也柔脆其死也枯稿故堅強者死之徒柔弱者生之徒文定曰沖氣在焉則體無堅強之病至理存焉則事無堅強之纍矣是以兵強則不勝木強則共故堅強居下柔弱處上共如字謂人共伐之也列子云兵強則滅木強則折是矣夫物之精者常在上而粗者常在下其精必柔其粗必強理勢然也而天下亦未有剛強而能居人上者莊子曰以懦弱謙下為表是也達真子曰善勝敵者不爭皆意不在於強也木之強大則人必共伐之兵以柔弱致其勝木以柔弱致其存是以堅強可居其下而柔弱可處其上也人之立性固不異此右七十六章河上名戒強此章言用柔弱可以保沖和之氣天之道其猶張弓乎高者抑之下者舉之有餘者損之不足者補之天之道損有餘補不足人之道則不然損不足以奉有餘天道無私常適乎中故滿招損謙受益時乃天道葉夢得曰張弓者挽之而後發是亦斂之於己而後施之於物者也以平正為主調和為常故與天道同此其高下抑揚有餘不足無不中其節者其取之不在外也蓋出於自然故無私而均人則反是而不求於內是以每損人之不足以奉己之有餘蓋出於使然故多私而不均開元注引損上益下為益損下益上為損二一卦之義亦明孰能損有餘而奉不足於天下者其惟道乎是以聖人為而不恃功成不居其不欲見賢邪惟有道者為能為天之所為亦不恃其為不居其功若使為而恃功而居則賢見於世矣賢見於世則是以有餘自奉也右七十七章河上名天道此章明道之用中正而無私惟觀天之道知之而聖人則與之同也天下莫柔弱於水而攻堅強莫之能勝以其無以易之也以其善下柔弱之性不易故不失己而能勝物柔之勝剛弱之勝強天下莫不知而莫之能行觀水可喻則事近而理明豈難知哉惟信道不篤所以莫能行是以聖人言受國之垢是為社稷主受國之不祥是為天下王溫公曰含垢納汙乃能成其大正言若反正言合道若反於俗蓋反於小智之近情乃合於大道之至正右七十八章河上名任信此章言柔弱能容則為物所歸也和大怨必有餘怨安可以為善夫怨生於妄覺妄即真怨亦何有今不治其本而欲和其末則外雖和而內未忘是有餘怨也豈足為善哉若徹見根本則真忘寂然矣是以聖人執左契而不責於人夫契有左右所以為信而息爭聖人與人均有是性人惟執妄馳騁於爭奪之場故惑於大怨而迷其本曾不知真性之無妄也是以聖人惟抱此本然之正性雖不求悟於人而人感其化及乎妄盡怨釋亦莫不廓然自得以還其固有之善而合於正矣亦如右契之合左豈待責之乎哉左契者猶言性之先覺也清源子曰古者結繩而治破木以為契君執其左臣執其右契來則合所以取信故有德司契無德司徹有德者不言而信乃無為而民自化猶執契也徹者通也彼無德者乃欲人人而通之故汲汲於和怨也天道無親常與善人清源子曰契之無私亦猶是也惟合者得之黃曰然為善者非特無求於人亦無求於天惟任其自至而已右七十九章河上名任契此章明息妄在於復性皆無為之治也治也小國寡民使民有什伯之器而不用也人稀務簡君無事於尚賢而民各安其性分之天使有材器堪為什夫伯夫之長者亦不求用於世矣蓋當文勝欲弊之時人好自用而夸大於外故舉此以諭太古之治而勸之以務內之學也使民重死而不遠徙遂性無求故安土而不遷雖有舟輿無所乘之雖有甲兵無所陳之使民復結繩而用之不競利不紛爭故復結繩可也甘其食美其服安其俗樂其業內足而外無所慕也惟樂於內則無入而不自得故雖疏惡隘陋亦自以為甘美安樂蓋其樂以道不以物也鄰國相望雞犬之聲相聞民至老死而不相往來望音亡與冠蓋相望義同惟無欲無求故如此右八十章河上名獨立此章明安性分則無所企求信言不美美言不信信則為實而合道故不必美美則為觀以悅人故未必信善者不辨辨者不善文定曰以善為主則不求辨以辨為主則未必善也知者不博一以貫之何事於博博者不知溺於博者未必知道聖人無積既以為人己愈有既以與人己愈多為于偽切助也聖人當體即一一亦不立何積之有蓋無藏於中無交於物泊然純素無私而已故施其德以為人而我未嘗費推其道以與人而一無盡也曹曰體虛而善應天之道利而不害聖人之道為而不爭文定曰勢可以利人則可以害人矣力足以為之則足以爭之矣能利能害而未嘗害能為能爭而未嘗爭此聖人與天為徒所以大過人而為萬物宗者也右八十一章河上名顯質自三十八章至此凡四十四章為下篇此經二篇通明道德之旨首立可道可名為設教之宗元次標上德下德述因時之澆朴此章寄信美以彰言教論善辨以戒修行述知博以示迷悟陳無積以教亡遺假有多以暢法性合天道以論聖人欲使學者造精微於理性之中忘筌蹄於言象之表故能悟教而忘教以是終焉此蓋敘述者之大旨也道德真經集解卷之四六爻重而大易之全體微三傳作而春秋之初意泯河上公分章定句而老子混成之道散夫道不可言聖人欲發人之覆使知天地之大全無言而不可得也是經詣道之大途學者即此而求自知歸矣逮河上公諸人參錯己見注腳紛然或者始有多歧亡羊之嘆圭山之集注豈非欲覺冥途於晦蝕之中方執塗人之見而問吾故廬者耶使其由是而之可直參老子混成之旨矣余嘉其用志勤立言正而贊一注腳云寶祐丁丑蒲節天台謝跋昔孔子無常師故萇弘師襄老聃郯子之徒皆嘗問焉然觀其語南宫敬叔獨以禮樂之原道德之歸屬之老聃則聃豈萇弘而下所可比耶其所以責原壤者以學老氏而差於老氏固無貶也雖然孔子以實有為理老子以虛無為道孔子以太極兩儀四象八卦為生生之本老子謂道生一一生二二生三三生萬其數亦異孔子欲人知道之無物不有無處不在無時不然老子欲人求是道於天地萬物之始蓋道一也而隨人所指有不同數一也在人所用有不同其不同者固不可以強同也至其見素抱朴少私寡欲以治心載營魄抱一綿綿若存以治身以重為輕根以靜為動根不矜不伐不爭以應物無為無欲去泰去甚以治國家天下雖聖人不能違也是以谷神玄牝程子取焉養氣之説朱子取焉吾黨其可輕議之哉圭山董道士所注老子道德經集古今諸家之善以發明宗旨雖修煉家自附於老子者本末先後亦有辨焉其用工深而有助於老子之教多矣覽者毋忽寶祐丁巳年夏前恩平假守黃必昌京甫序
