body:
  text: 後學董思靖集解上德不德是以有德御註曰孔子不居其聖乃所以有德體道而有得於己之謂德王顧等云有德則遣其失不德則遣其得下德不失德是以無德拳拳服膺而不敢失是未能化者也故於上德爲有間矣上德無爲而無以爲以者用也謂無用於爲也下同上德者至德也無爲而已下德爲之而有以爲此必思而後得必勉而後中乃行而未至者之事也以其尚滯於有爲故未能全乎至道此皆釋其所以爲上德下德之分也上仁爲之而無以爲仁者心之德愛之理專言之則可包四者此非指統體之仁而言故於上德爲有差等然仁者靜雖爲之而無用於爲也上義爲之而有以爲義者事之宜而有割截之意故次焉上禮爲之而莫之應則攘臂而仍之禮者天理之節又人事之儀則實以忠信爲本而尚繁又則末也今曰爲之則是徒其文以彊之有不肯從則繼之以攘臂而末流有不勝其弊矣老子時當尚文之極故獨言之也切蓋欲以無爲自然之道化斯民也此三者只言上而下者已不足言矣攘臂謂攘除衣袂以出臂也仍繼也温公云仍引也字或作扔故失道而後德失德而後仁失仁而後義失義而後禮道體混然乃天地人物之所公共也人體是理而得諸己無待於外之謂德初非道之外别有所謂德也但旣謂之德則有上下倫下之分乃不若道之徧該故不德則德之至而全體是道矣若夫執而有之則下德之未能化而失乎道之全也故曰失道而後德關尹子曰彼可得者名德不名道是也蓋德之名顯則道之名泯仁之名顯則德之名泯愈趨愈下而所尚亦愈偏矣莊子曰道隱小成信哉夫禮者忠信之薄而亂之首也徇文之極故其本質漓而末流則亂之所由生孔子所以欲從先進皆此意也前識者道之華而愚之始也此用智者之事也謂役智以求明或臆度而屢中然終不能以周知適所以蔽其自然之明覺乃愚之始也孟子亦曰所惡於智者爲其鑿也蓋蔽於華藻則不能全大道之純素非愚而何是以大丈夫有高世之見而不徇流俗者謂之大丈夫處其厚不處其薄居其實不居其華故去彼取此處去並上聲盍亦反其本矣文定曰世人視止於目聽止於耳思止於心故樂其有得於下而迷其上喜薄而遺厚采華而棄實自非大丈夫孰能去彼取此哉右三十八章河上名論德此章明全德而勸還淳或問道德五常其有辨乎其無辨乎何用之異也曰烏乎無辨道則統體者也德則隨其量之所充而得諸己也道猶混然之元炁也德猶年與時之名也仁義禮智猶春夏秋冬之號也全是四者則曰一年得其仁之盛則曰春禮曰夏義曰秋智曰冬各得其實之謂信故每季士旺一十八日猶此義也有仁之義則生中有殺義之仁則殺中有生如二月榆死八月麥生之類也其於天下也亦然皇極經世書曰三皇以道化天下五帝以德教天下三王以功勸天下五伯以力率天下三皇同仁而異化五帝同禮而異教三王同義而異勸五伯同智而異率是知三皇之世如春也五帝之世如夏也三王之世如秋也五伯之世如冬也老子與關尹相遇之時其當秋冬之交蓋欲以貞固之道化斯世而復於春乎或曰其序不同何耶曰經世有因有革故依順布之序此言名迹之流弊故全用革如化書云仁不足則義濟之金伐木也義不足則禮濟之火伐金也禮不足則智濟之水伐火也智不足則信濟之土伐水也然則居實處厚乃信之實又所以爲始之終終之始者歟郭德元嘗問於朱文公曰老子云禮者忠信之薄而亂之首孔子又却問禮於他不知何故文公曰老子曉得禮中曲折蓋他曾爲柱下史於禮自是理會得所以與孔子說得如此好只是他又說這箇不用得亦可一似聖人用禮時反若多事所以如此說如禮運中謀用是作而兵由此超等語便自有這箇意思也昔之得一者天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以爲天下貞其致之一也夫一即道也自古固存故云昔也凡物各具而道未嘗異故曰一也天以之清地以之寧神以靈谷以盈萬物以生侯王以貞其各能致乎當然之分者皆一之所爲也温公曰以事言之常乆不已所謂一也天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以貞而貴高將恐蹷蹷其月切顚仆也天之所以清明而職生覆地之所以寧止而職持載者得一也苟無以清寧則必有缺裂震發之變由失一也然一未嘗失故云將恐蓋致疑之辭也且一之爲物無去無來奚得喪哉直炁數之或餘或縮莫能稱是一之所爲耳故陰陽書曰天裂者陽氣之不足君德之衰微地震者陰氣之有餘臣道之失職如晋惠帝元康中天裂數丈殷然有聲周幽王二年三川震岐山崩蓋此類也乃至神所以謂之神者以其靈而已而其所以靈則得一而已茍無以靈則是其靈已息矣歇息也谷無以盈則不能受而應亦有所窮矣故曰竭也萬物則資一以生失之則滅侯王無以貞則是失道不能以自安而國家不可保矣雖然一非無也特外邪客氣或有以蔽其正爾首言天者形之大也終言王者天地民物之主也惟王能全其一以爲天下正則天地位而萬物育矣碧虚子曰會歸戒于王侯是也故貴以賤爲本高以下爲基是以侯王自稱孤寡不穀此其以賤爲本邪非乎穀美也邪音耶文定曰夫一果何物哉視之無形執之不得亦天下之至微此所謂賤且下也侯王以孤寡不穀自稱言得一以爲之本也故致數譽無譽不欲琭琭如玉珞珞如石琭音禄玉貌珞字當作硌音洛石貌數入聲速也謂不能牧謙以賤爲本而欲速致貴高之譽者是數譽也如此則過情之譽暴集無實之毁隨至是無譽也然亦復不欲如玉之貴而不能賤石之賤而不能貴也蓋惟不倚於一物則不可得而毁譽貴賤矣此茍非得一者孰能哉右三十九章河上名法本此章贊一之功用至大而終則告以毋執於一也反者道之動弱者道之用反靜者道之所以動體弱而用實彊也言動不言靜言弱不言彊乃互文以見意而體用之義亦明矣謂復乎靜有以立其體然後動之用所以行語其體之寂然無朕則弱矣而其用之遠而不禦亦彊矣此雖體用動靜周流無間然而動也必本乎靜用也必源乎體故元化之工則藏於冬乃所以蕃於春爲學之道則精義入神乃所以爲致用之本也天下之物生於有有生於無此又以生物之義證之謂凡物皆自氣化而形生乃生於有矣然原其始之所以生則道也而道初無形容聲臭之可即故曰生於無也右四十章河上名去用此章明崇體以致用也或云道以靜爲正故動則爲與道相反矣若爾則是以道爲專屬於靜矣殊不知動靜者氣也而道則宰制乎動靜而不囿乎動靜者也或云反常合宜乃道之動而應變此顯權也以弱自守乃道之常用此顯實也而有生於無則權實泯矣上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以爲道道非形聲不可見聞惟上士所禀純靜見識超越故一聞無疑如空即空造次不違中士之見可上可下故或信或疑下士則智不足以明信不足以守莊子所謂高言不止於衆人之心故大笑之也故建言有之謂古之立言者有曰下文皆勤行之狀也明道若昧惟照了精微故遺形去智而含光不耀也夷道若類夷平也纇盧對切絲之不匀也高下俱融與物無際然以俗觀之則若有節纇而不可取以爲用也進道若退爲道日損損之又損以至無爲故若退也上德若谷上德不德若谷之虚大白若辱忘色相者能納汙也廣德若不足廣而有所限量則非廣矣惟德至廣而不自以爲足故能廣也建德若偷潜修密行立德而不自衒也玄綱論云功陰則能全亦此意也質眞若渝渝羊朱切變也質眞純素也惟文質兼備則不執於一故隨物變而内不失其眞外若渝也大方無隅隅者角地也大方無畛域之可窮故無隅大器晚成積之乆者發必洪故大器則不速成大音希聲大象無形道隱無名經云聽之不聞名曰希故大音希聲經云無象之象故大象無形此雖超乎視聽之表然而冥冥之曉無聲之和亦何嘗不昭昭然於見聞之間哉是皆中士之所以若存若亡而下士之所以大笑也此十二者乃道之或隱或顯寓於事物者也而道之大全則隱於無名焉夫惟道善貸且成貸施與也成謂物賴之以成功也右四十一章河上名同異此章言道之大全中下難知蓋道無形無名故不可以有爲之功而致其極惟能沉潜涵泳則道自來居此道之所以善施與萬物而成其全之無私也是以古之學者爲己而終至於成物者體此道也道生一一生二二生三三生萬物朱文公曰道即易之太極一乃陽之奇二乃陰之耦三乃奇耦之積其曰二生三猶所謂二與一爲三也其曰三生萬物者即奇耦合而萬物生也若直以一爲太極則不容復言道生一矣此與列子易變而爲一之語正同所謂一者形變之始耳不得爲非數之一也萬物負陰而抱陽冲氣以爲和凡動物之類則背止於後陰靜之屬也口鼻耳目居前陽動之屬也故曰負陰而抱陽如植物則背寒向煖而冲氣則運乎其間又統而言之則神陽而質陰神運於中曰抱質見於外曰負氣則動陽而靜陰乃濟之以中和而充乎形質爲神所乘之機也温公曰萬物莫不以陰陽爲體以冲和爲用文簡曰陰陽氣偏及交會而氣和是二之交焉而三三之徧焉而萬者也人之所惡惟孤寡不穀而王公以爲稱故物或損之而益益之而損惡去聲温公曰滿招損謙受益所以去甚泰就中和也人之所教亦我義教之彊梁者不得其死吾將以爲教父彊平聲茍知損益之義如此則人之所以設教亦宜皆以我冲和之義教之是知彊梁者妄之極而終至於不得其死尤當知警而不可從也故曰吾將以爲教父父者本也且教乃師道然師則尊而不親父則尊而又親是以言無隱情如易曰無有師保如臨父母即此意也今專曰父者教道主尊嚴也右四十二章河上名道化此章言道寓於陰陽而生萬物亦莫不以冲和爲用也天下之至柔馳騁天下之至堅無有入於無間是以知無爲之有益也間去聲惟道無形故曰至柔惟物有質故曰至堅馳騁猶運化役使之意道之妙物皆以無形而鼔舞有質也夫道體無有化生衆形泰山秋毫待之成體故其入於物也初無間隔又道體圓攝無之與有並囿其中混然無間是則道在物中物在道中皆無間也人能體之則相得性融廓然無爲而利益不窮矣文定曰聖人惟能無爲故役使衆彊出入羣有不言之教無爲之益天下希及之矣希罕也王輔嗣曰至柔不可折無有不可窮以此推之故知無爲之道而有益於物也夫孰能過此哉右四十三章河上名徧用此章贊虚柔無爲之有益也名與身孰親身與貨孰多身者神之舍豈不親乎名者實之賔其可尚乎況身一而已外物無窮茍棄身而徇名役一以求多愚莫甚焉蓋人能弘道故身者道之本也文定曰若夫忘我則身且不有况名與貨乎得與亡孰病温公曰得名貨而亡身與得身而亡名貨二者孰病文定曰不得則以亡爲病旣得而病失又有甚焉是故甚愛必大費以隋侯之珠彈千仞之雀皆甚愛之迷也多藏必厚亡無藏則無所亡開元註甚愛名者必勞神非大費乎多藏貨者必累身非厚亡乎知足不辱知止不殆可以長乆惟審於内外之分則知止知足而無得失之患故能安於性命之常亦何殆辱之有所以可長乆也漢之二疏曾事斯語右四十四章河上名立戒此章明去僞全眞則可乆也大成若缺其用不敝敝毗祭切敗壞也體至道之大全而盛德若不足故其用愈乆而愈新也大盈若冲其用不窮道備於己而有若無實若虚故積愈厚而用愈不窮此兼用而言下則略文也大直若屈惟量之大故直而不肆初無涯涘之可窺然於正己以矯物者觀之則若屈也大巧若拙其功用至於參贊化育雕刻衆形而體則無爲故若拙也大辯若訥離語默而萬理昭融超見聞而重玄了悟故若訥也躁勝寒靜勝熱清靜爲天下正動屬陽靜屬陰故躁勝寒靜勝熱然皆未免於一偏而有所對待若夫清靜者則御六炁之卞乘天地之正動未嘗動靜未嘗靜而動靜一致矣故爲天下正右四十五章河上名洪德此章言體大道之全而爲天下正或云苟成而不若缺盈而不若冲直而不若屈巧而不若拙辯而不若訥是躁之不能靜靜之不能躁耳夫躁能勝寒而不能勝熱靜能勝熱而不能勝寒皆滯於一偏也惟泊然清靜則非成缺辯訥之所能定而後無所不勝乃所以爲天下正而能成其大矣天下有道却走馬以糞天下無道戎馬生於郊却與郤同除去也糞治田疇也戎馬者備戰之馬也郊者二國相交之境也以内言之心君泰然則却返氣馬以培糞其本根反是則意馬馳於外境矣罪莫大於可欲禍莫大於不知足咎莫大於欲得究其根本原於縱欲文定曰匹夫有一於身患必及之侯王而爲是必戎馬之所自起故知足之足常足矣黄茂材曰一性之内無欠無餘人能安之無適不足右四十六章河上名儉欲此章戒貪求之貽害貴知足以爲常也不出户知天下不窺牖見天道天地萬物同出於道反身而誠萬物皆備温公曰得其宗本故也其出彌遠其知彌少温公曰迷本逐末也是以聖人不行而知不見而名不爲而成蓋清明在躬無爲而已温公曰至理不易也右四十七章河上名鑒遠此章言有眞知之明則可以超見聞之域故無爲而化成也爲學日益爲道日損損之又損以至於無爲無爲而無不爲矣開元註云因益以積功忘功而體道故取天下常以無事及其有事不足以取天下取者取而化之也蓋克己復禮而天下歸仁之意黄茂材曰無所不知而後可以言學故學欲日益益者已化然後可以言道故道欲日損然益者可以進損者不可彊損而未能兼忘其損未爲損也直須瞥地脱落前後際斷乃至無爲之地故能無所不爲而應用不窮施於天下綽綽然矣右四十八章河上名忘知此章言損有集虚其益無窮聖人無常心以百姓心爲心惟聖人無我故其心不滯於一而物來順應矣善者吾善之不善者吾亦善之德善矣信者吾信之不信者吾亦信之德信矣御註云舜之於象所以善信者至矣人之有生同具此理聖人於人莫不皆以善信遇之此聖人之德量也蓋善不善信不信在彼而吾之善信未嘗渝此聖德之善信矣苟善善信信而絶其不善不信者則豈所謂常善救而不棄哉聖人之在天下惵惵爲天下渾其心百姓皆注其耳目聖人皆孩之惵圖協切憂勤貌爲去聲渾與混同胡本切天下之善惡信僞皆未知所定聖人則惵惵然爲天下渾心蓋欲融化其異而混合其同故無善惡無信僞皆一以待之彼方注其耳目以觀聖人之予奪吾皆以嬰孩遇之若保赤子此聖人之誠心也則彼亦將釋然而自化矣皆孩之意謂不生分别也右四十九章河上名任德此章明虚心而應物均養以自然之德出生入死性無生死其出入乘炁機耳故是炁之伸則萬物出於機而謂之生是炁之歸則萬物入於機而謂之死生之徒十有三死之徒十有三人之生也動之死地亦十有三夫何故以其生生之厚十乃成數故舉爲例蓋謂自生至壯乃炁之伸生之徒也於十分之中居其三焉自老至死乃炁之歸死之徒也於十分之中居其三焉人之生也自壯及老之間乃動而入用之時亦十中居其三焉苟動失其正則用壯從妄皆動之死地矣經云物壯則老是謂不道是也夫何故者設問之辭也以其生生之厚者答之之辭也謂由其益生欲厚而不能忘我是以逐於妄而之死地耳蓋惟溺於貪生則必有死爲之對而於不屬生死無所對待之一者反昧矣故經云惟無以生爲者是賢於貴生也或云妄念芸芸乃生生之甚也亦通茍能主靜以養虚明則動未嘗離靜而動靜兩忘乃善攝生者之所爲也文定云生死之徒以十言之三者各居其三矣豈非生死之徒九而不生不死之道一而已乎不生不死則易所謂寂然不動者也老子言其九不言其一者使人自得之以寄無思無爲之妙也蓋聞善攝生者陸行不遇兕虎入軍不被甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地兕音似山海經云兕出湘水南蒼黑色爾雅云形似野牛而一角蓋聞者謙辭不敢自道也夫反流全一攝念歸無乃善攝生者關尹所謂忘精神而超生是也如是則一亦不立故其天守全其神無郤物無自而入焉所以數不能拘患不能及生地且無安有死地哉故曰至人無己與道同體右五十章河上名貴生此章明善攝生者以至無爲宗故能遠患害超生死也然爲之說者不一如河上公韓非碧虚子葉夢得林東皆以四支九竅爲十三而動靜屬於生死昧者自戕自賊動與惡會而之死地矣若是則死之徒與動之死地者皆無以别況是特形耳其所以動靜者豈由此哉杜廣成以十惡三業爲十三又有七情六欲之說者李文惒曰腎爲坎生門也心爲離死户也皆一周十二辰消而再始是爲十三且遺其動之死地之十三開元註孫登司馬邵王曹皆曰十人之中各有三人焉大率謂柔弱以保生者十中有三剛彊以速死者十中有三又志愛生而不免趨死者亦十中有三曹曰修長生者生之徒修寂滅者死之徒枉縱之人全以嗜慾動作皆趨死地焉蜀趙氏又以五行生死數爲十三其說以甲己子午九乙庚丑未八丙辛寅申七丁壬卯酉六已亥獨居四之訣起數如水生於申申數七死於卯卯數六合十三也餘可例推此乃合生死之數而爲十三則經文當云生死之徒十有三乃可矣黄曰水之成數六火之成數七爲十三雖近註多取此說然矢口成書豈必若是况五行而獨舉其二且棄生數而獨取成數果何謂乎又有出腎水而入於心爲出生入死者且引張平叔陰裏十三陽中六七之詩爲之證所謂攝生則是取坎之實以點離虚至於無死地則變成乾體矣其說似通而實非經㫖文定曰用物取精以自滋養者生之徒也聲色臭味以自戕賊者死之徒也二者旣分生死之道矣吾又知詐而不知息知言而不知默知思而不知忘以趣於盡所謂動之死地者也而清源子之說亦然但死之徒與動之死地亦若無别愚所以獨明是炁之伸屈爲生死之徒而以入用爲動之死地也蓋仙道貴生故方生之炁陽也况乎天鬼道貴終故已退之炁陰也况乎地人道貴心則可以生可以死故入用之氣中和况乎人至所謂不生不死之一則非數而數以之通不用而用以之成乃况乎道此其所以周流乎三者之間而非三者之所能拘也歟猶經世書三用而一不用之意亦三以况天地人而一况道也故以元亨利貞之交爲交數其貞與元之間有無之極也是以無數故無數則存乎荄核乎前輩以康節爲得老子之㫖信哉道生之德畜之物形之勢成之是以萬物莫不尊道而貴德道之尊德之貴莫之爵而常自然道爲萬物母德乃道之在我者也在天地爲天地之德在聖人爲聖人之德道則始之所以生生者德則牧養羣衆而不辭非其德則萬物不得遂其生故云畜也物者皆道德之所以形見者也勢者萬物之理相因而成者也如是則鳥得不知崇其本哉所以莫不尊道而貴德也夫受命於天則爲天子受命於天子則爲諸侯有所受命則出命者能卑賤之而道在萬物之先以制其命果孰能爵之乎惟予奪不屬他人故常自然而所以尊且貴也故道生之畜之長之育之成之熟之養之覆之生而不有爲而不恃長而不宰是謂玄德長上聲此八者皆大道之元功而不有不恃不宰皆出於無我此乃德之至深矣遠矣故曰玄德八者之義則資始之謂生包涵之謂畜遂其形之謂長字其材之謂育輔其功之謂成終其時之謂熟保其和之謂養護其傷之謂覆首言德畜之而此則皆歸於道蓋莫非道也首言道而終歸於玄德者茍不至德則至道不凝焉其實一也右五十一章河上名養德此章言妙本應感生成之㫖明萬物尊道貴德之由次美生育之功終贊忘功之德也天下有始以爲天下母旣得其母以知其子旣知其子復守其母没身不殆未有天地自古固存而物各資始以生故謂之母原乎始旣得其母則體斯立矣又當察其未嘗不在乎有物之中則凡資於道而生者莫非子也故反乎後以知其子則用不窮矣旣知其子又不可迷本逐末故告之以復守其母人惟體乎無爲自然而純亦不已則萬物萬事亦各自得其所此外初無别法亦非有意於守也所謂應物者化在躬者神如斯而已矣蓋道之體混然則萬殊之所以一本故得其母以知其子道之用無窮則一本之所以萬殊故知其子而復守其母夫如是故能混本末精粗爲一致而原始反終死生無惑矣故云没身不殆也塞其兊閉其門終身不勤開其兊濟其事終身不救易云兊說也蓋心意愛悦則染著也門者諸根之門也曰塞曰閉則告學者守母之行也謂愼言語節飲食閑情念葆神炁視聽以禮動靜以和此皆所以養形而養德也是以終身不勞而有成茍或反是則捨其内而專務於悅外故終身役役而不救見小曰明守柔曰彊用其光復歸其明無遺身殃是謂襲常遺唯季切貽也惟道無形不可以目窺可謂小矣不可以力得可謂柔矣察之精而不爲物所蔽故曰明守之專而不爲物所奪故曰彊學者潛心體察放下玩味則涵養之功得矣又見與守是用功處明與彊乃效驗處明者體也光者用也言靜存之體旣立則動察之用必行猶明之光照物體不傷而用不窮然又須和其光而不耀冥其慧於無知則退藏於密而殃咎不能及矣如是之謂善傳襲眞常之道也夫德愈盛則心愈下旣到此地自無遺殃之患此爲學者語也右五十二章河上名歸元此章明返本還元之道或云始者炁也凡人受炁以生則炁爲母而神則寓於炁故爲子母子相守則神安炁專此亦入道之初機也使我介然有知行於大道惟施是畏大道坦然無從無適不可以智知不可以識識無所施設作爲而已今欲介介然有知行於大道是此心先有所倚著矣故惟如此施爲是可畏也蓋前章旣勉人以守母之行故此又戒人以有爲之害也大道甚夷而民好徑好去聲定觀經云背道求道怨道不慈蓋好捷徑則終無可至之理朝甚除朝者國主所居之地甚除謂多用也而心君之多思慮也亦然田甚蕪倉甚虚謂内無所儲也若以身而言則田三田也倉則精氣所藏之地也如胃爲太倉之類服文采帶利劍厭飲食資財有餘是謂盜誇非道也哉厭多也此皆不務修内而反矜施其外是誨盜也夫豈大道之行也哉此傷嘆之辭也温公曰服美不稱貪積不厭故曰盜誇所以有此誇者豈非本欲行道而更鑿以致失哉右五十三章河上名益證此章言有知不足以明道好徑不足以行道及以未證爲證未得爲得皆非道也善建者不拔善抱者不脱子孫以祭祀不輟惟道範圍天地流行古今該上下而不拔周萬化而不脱陰陽之相代故新之相易猶子孫相承而不窮也學者必先建中以立其本則實無所倚而不可拔抱一以專其守則實無所執而不可脱及德盛而利他則後覺之所宗乃至源深流長傳之後世愈乆而愈親也温公曰不拔者深根固柢不可動搖不脱者民心懷服不可傾奪不輟者享祚長乆是也修之身其德乃眞修之家其德乃餘修之鄉其德乃長修之國其德乃豐修之天下其德乃普眞則不僞也餘則綽然裕如也長者無不及也豐者無不足也普者無不徧也蓋道之眞以治身其緒餘以治人然修之身此理也推之家國天下不外乎是而已温公曰皆循本以治末由近以及遠也故以身觀身以家觀家以鄉觀鄉以國觀國以天下觀天下吾何以知天下之然哉以此觀之之道其則不遠豈假他求哉蓋物分雖殊一本而已以此觀之莫不然者此意當默契於語言之外開元疏云以修身之法觀身實相本來清淨有見旣遣知空亦空頓捨二偏迥契中道可謂契眞矣右五十四章河上名修觀此章明修身以及物修之彌廣則所及彌遠致知格物不外乎此含德之厚比於赤子含懷至德如嬰兒然毒蟲不螫猛獸不據攫鳥不搏螫音適攫厥縛切搏音博虚舩觸舟雖惼不怒全天之人物無害者碧虚曰毒蟲蜂類以尾端肆毒曰螫猛獸虎豹類以爪拏按曰據攫鳥鵰鶚類以羽距擊奪曰搏骨弱筋柔而握固未知牝牡之合而䘒作精之至也䘒子垂切說文云赤子陰也文定曰無執而自握無欲而自作是知精有餘而非心也終日號而嗌不嗄和之至也號户毛切啼也嗌音益咽也嗄所嫁切聲嘶也文定曰心動則氣傷氣傷則號而嗄故知心不動則炁和也知和曰常曹曰和者生理之常知和則純粹靜一歷萬變而不失也知常曰明由明乃能見此常乆自然之道亦必能常然後其道愈明故知常則明莫加焉益生曰祥刻意有爲皆曰益生祥者妖也達眞子曰祥者非其常也文定曰生不可益而欲益之則非其正矣是妄作也經云不知常妄作凶是也心使炁曰彊心動則不能專氣以致柔乃彊之始是失其赤子之心矣物壯則老是謂不道不道早已已音以止也益生使炁皆失自然之道是徒速其衰老也茍知不合於道宜早已之右五十五章河上名玄符此章首以赤子明自然之本體純粹混然所以物莫能窺故雖握雖號亦莫非出於自然也末則戒其纔有絲毫作爲之心則失其自然矣黄茂材云古本無嗌字而嗌不嗄荘子之文也後人增之知者不言言者不知至道之眞語默不足以載惟親證者知之塞其兊閉其門挫其鋭解其紛和其光同其塵是謂玄同義見四章及五十二章蓋内外交養默與道會而不異於人也不可得而親不可得而疏不可得而利不可得而害不可得而貴不可得而賤故爲天下貴此言有德者之爲如此惟其周而不比執而圓機以應無窮故不住乎一境豈情計之所能及哉此夫子所以發猶龍之嘆也右五十六章河上名玄德此章謂悟道者忘言無執故内外兼治混合大通所以貴也以正治國以奇用兵以無事取天下吾何以知其然哉文定云古之聖人柔遠能邇無意於用兵惟不得已然後有征伐之事故以治國爲正以用兵爲奇夫天下神器不可爲也是以體道者惟廓然無事雖無心於取天下而天下歸之矣夫天下多忌諱而民彌貧人多利器國家滋昏人多伎巧奇物滋起法令滋彰盜賊多有謂失無爲之治而多忌禁則民將舉措失業而機械生若以身喻天下則心爲君炁爲民而拘小術鑿私智溺多岐縱六賊故不能無爲也文定云人主多忌諱下情不上逹則民貧困而無告矣利器權謀也在上無爲使民無知無欲而已惟上下相欺以智則民多權謀而上益眩而昏矣奇物奇怪異物也人不敦本業而趨末伎則非常無益之物作矣患人之詐僞而多出法令以勝之民無所措手足則日入於盜賊矣故聖人云我無爲而民自化我好靜而民自正我無事而民自富我無欲而民自樸此自然之應而無爲之成功也右五十七章河上名淳風此章明無爲之治其政悶悶其民淳淳悶叶音莫奔切寬裕無爲之象夫有德者其於義分莫不截然明白而其量則寬洪故爲政以德則不察察於齊民雖以俗觀之若不事於事然民實感自然之化乃所以爲淳和之至治也其政察察其民缺缺惟不知修德以爲爲政之本而專尚才智乃欲以刑政齊民然民未可以遽齊苟務在於必齊則必有所傷故缺缺也此所謂害生於恩禍福倚伏正猶是矣禍兮福所倚福兮禍所伏孰知其極謂禍福相因莫知其所止極也其無正邪若然則果無正定之理耶正復爲奇善復爲祅民之迷也其日固乆惟世人迷於小察之近情而不知正道之大全故不能安於至正而反爲奇以爲正不能循於至善而反爲祅以爲善及其所應旣差又不知反求在我之所感而乃貴其彼之所應者此皆迷失正道日已乆矣亦猶爲政不能以悶悶之德量容之而反務於察察以爲善與正殊不知若此則是本欲全民而反致缺缺矣故下文舉聖德以勸修也開元註云衆生迷執正者復以爲奇詐善者復以爲妖異故禍福倚伏若無正耳是以聖人方而不割惟行方而德圓故無割截之迹廉而不劌劌居衛切傷害也清而容物故不劌直而不肆大直若屈所以不肆肆布列也光而不耀復歸其明也是四者皆悶悶之政也蓋聖人惟恬淡無爲而方廉直光之用自整然於其中而人不知使天下各安其性命之情而不陷於一偏所以無割劌肆耀之過而禍福何有哉右五十八章河上名順化此章欲使民去智與故循天之理以祛其近見之惑也道德眞經集解卷之三
