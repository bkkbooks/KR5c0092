body:
  text: 後學董思靖集解道可道非常道名可名非常名此先標以爲立言之始也道者萬理之總名名者萬物之所指然道不可名非言能喻將托於言强名曰道故道而可道名而可名則非常道常名矣常道常名者即經所謂道常無名而自古及今其名不去者是也常之爲言自然長存無時不然無處不有無名天地之始此言道者天地萬物之原也以其絶無朕兆故莫得而名此即常道常名形而上者是也有名萬物之母此即兩儀旣立已有可名而萬有皆從此生乃形而下者是也常無欲以觀其妙此言聖人體道在己乃寂然不動所存者神之時即此可見道體之至微至妙者也常者眞常妙本也蓋無欲爲靜體之常也有欲爲動用之行也雖動靜不同時體用必有分然妙本湛然寂而常感感而常寂未始有間常自若也故皆曰常觀者廓然大公寂無不照之義常有欲以觀其徼徼古弔切邊際也此感而應之時也於此可觀妙道之用矣是蓋指其動而可見處言之周子所謂靜無而動有是也陳景元云大道邊有小路曰徼此兩者同出而異名同謂之玄玄之又玄衆妙之門此總結上意兩者謂無名有名妙與徼也體用一源故曰同也出即動靜之義謂或動或靜而體用分焉故曰異名然稱名雖殊即本則一故又曰同也惟同則性情冥而不可致詰是謂之玄凡遠而無所至極則其色必玄其在人心乃淵默無象之義夫玄雖變通無極深不可測然猶有玄之心在焉又玄則遣其滯玄之累也湛然無迹而能開闔陰陽化生不匱在於事物最爲微妙而理事皆由此出故云衆妙之門右一章河上公名體道章諸家多以章首數字爲名此章包羅揆序一經之㫖也或問有名無名前輩多就無字有字爲句今獨不然何耶曰所謂無名即道也有名即炁也惟道無形而炁有兆故以無名有名爲之别今云無名天地之始者蓋謂道在天地之先而初無定名之可指故經云道常無名又云道隱無名是也惟道無所不在雖超乎無物之先然亦未嘗不在乎有物之後故在無爲無而未嘗滯於無在有爲有而未嘗局於有惟不可定名而其名自古以固存此其所以爲常道常名也歟若直以無而名之則是以道爲專屬於無及其無化而爲有又不可名爲無矣有無相因變化不己名亦隨之則豈所謂常名哉况有無固不足以論道荀欲必謂之無未免淪於空寂之一偏則天地萬化果何自而有耶今云無名者特以其寂兮寥兮無形可狀無名可指然於無形無名之中天地萬物之理莫不畢具此其所以不可直謂之無也夫道不可得而名也惟聖人無思於言則己荀欲立言非名之則無以顯其道然又恐學者尋言滯句而名道以方故先標於篇首曰道可道非常道名可名非常名其㫖深矣或問常無欲常有欲者前輩多以常無常有爲絶句今亦不然則所謂無欲故可而謂之有欲可乎曰聖人之心何嘗有欲今所謂有欲乃即其起處而言耳當其靜而無爲之時乃無欲也及其應物而動雖未嘗離乎靜然在於事事物物則已有邊徼涯涘之可見故對無欲而言有欲也欲猶從心所欲不踰矩之欲耳朱文公答沈莊仲之問亦云徼是邊徼如邊界相似是說那應接處向來人皆作常無常有點不若只作常無欲常有欲看今若必欲以常無常有爲絶句則是常無未免淪於斷滅之頑空而常有乃墮於執滯之常情豈足以觀妙道之體用哉況以常無爲句而下文云欲以觀其妙則於常無之時而亦謂之欲可乎或問此兩者同出而異名固多就者字爲句或有以同字屬上句何耶曰章首旣以無名有名别道與炁次又以無欲有欲分體與用則章末固當合而結之也夫道炁體用固不可無别然初非相離而各爲一物惟無是道則炁無以立無是炁則道無以寓非是體則用無以行非是用則體無以顯道宰乎炁而不囿乎炁用著乎體而實源乎體道即體也炁即用也體用一源理物無間故曰此兩者云云蓋雖即冲漠無眹之體而昭然事物之用己具即事事物物之用而漠然無眹之體不違然動靜不同名物理必有分是以靜而無名無欲則體也及至於動而有名有欲則用也故繼之曰異名矣則是即靜之體而爲動之用初非指動靜爲二本及置體用於無别也故曰此兩者同出而異名惟其一本而異名所以該體用貫動靜混然玄同而無可指之迹故曰同謂之玄矣關尹子所謂不可測不可分故曰天曰命曰神曰玄合曰道是也然則所謂玄亦直寄云耳故又掃其滯玄之累而變化不窮矣至哉天下皆知美之爲美斯惡矣皆知善之爲善斯不善矣纔涉定名則有對待相因相軋如循連環故有無之相生難易之相成長短之相形高下之相傾聲音之相和前後之相隨和去聲此六對者相因而有也是以聖人處無爲之事行行不言之教處上聲此無爲也惟不落於一偏故六對不得而有萬物作而不辭此則無不爲也生而不有爲而不恃功成不居此大而化之也夫惟不居是以不去夫音符此其所以爲聖人也惟無爲自然則奚居奚去哉右二章河上名養身此章進學者於名迹兩忘之地也不尚賢使民不爭不貴難得之貨使民不爲盜不見可欲使心不亂尚賢名也貴貨利也惟無所徇則心不外馳矣夫所謂不見可欲者非膠其目而不見也使萬境之雜乎吾前惟不見其有可欲之處則情不附物而此心澄然矣所以銖視軒冕泥看金璧何欲之有是以聖人之治虚其心實其腹弱其志强其骨常使民無知無欲强渠良切知如字虚心者物我兼忘實腹者精神内守物我兼忘則慮不萌而志自弱矣精神内守則氣不餒而骨自强矣虚心弱志則民自無知實腹强骨則民自無欲也使夫知者不敢爲也爲無爲則無不治矣夫音扶知音智聖人之道内以之治身外以之治人皆然莊子所謂游心於淡合氣於漠順物自然無容私焉而天下治是也右三章河上名安民此章言忘貴尚泯思慮則復無爲而合至理道沖而用之或不盈淵兮似萬物之宗道體冲虚漠然無朕而其用則無所不該雖天地之大動植之繁在於其中亦莫盈其量矣蓋形有限而理無窮此固道之大而無外實不盈也然而其細亦無内故雖一物一事亦莫不各具而毫髪不遺是又必近察乎此而不可一向馳心空妙以求其所謂大而不盈者故云或也或之者疑之也又繼之曰淵兮似萬物之宗蓋淵者虚澄深靜而不可測之稱此其所以爲萬物之宗本然不可定名故云似也蓋即萬物而觀則必有以爲之宗主者而實未嘗有方體也挫其鋭解其紛和其光同其塵湛兮似或存物莫不有是道而人獨能全之故上聖教人修之以極其全也夫鋭者人之才智外形而有芒角者也紛者事之節目繁會而盤錯者也挫則磨礱以去其圭角而本然圓成者自若矣解則如庖丁之理解而紛則其族也及乎磔然已解而靜一不紊者自若矣此修於外以養其中也和其光則光矣而不耀同其塵則磅礴萬物以爲一此一於内以應其外也及其至也内外一如而後渾然之全體在我湛然常存矣似或者不敢正指也蓋道無定體而執之則失矣吾不知誰之子象帝之先道者天地萬物之母故曰不知誰之子象者有形之始帝者有物之主曰先者其未有形有物之前也右四章河上名無源此章明妙本冲虚而其用不測也天地不仁以萬物爲芻狗聖人不仁以百姓爲芻狗仁者生之本愛之理三才之大德也所謂不仁者不滯於仁猶上德不德之義也蓋天地之常以其心普萬物而無心聖人之常以其情順萬事而無情所以不係累於當時不留情於旣往如束芻爲狗祭祀之儀適時而用已事而棄豈容心哉此無私之極仁之至也天地之間其猶橐籥乎橐他各切鞴也籥音藥管也能受氣鼓風之物也天地之間二氣往來屈伸猶此物之無心虚而能受應而不藏也虚而不屈動而愈出陸河上本皆釋屈作竭朱文公曰有一物之不受則虚而屈矣有一物之不應是動而不能出矣多言數窮不如守中數音朔屢也司馬温公曰能守中誠不言而信也蘇文定公曰見其動而愈出不知其爲虚中之報也故告之云云右五章河上名虚用此章先以天地聖人之事及遠取諸物以明其無私無爲虚中之體旣立則其用自然不息也不可徒徇於用而不知反求其本之所以然故教之訥言守中以爲入德之門也夫中即道也即其體則圓同太虚卓然而無所偏倚之稱以其用則周流無間在於事物各無過不及之謂也守則學以求至者之事也及乎功用純熟則守底瞥地脱落當體澄然中斯立焉或云中者中宫黄庭北極太淵也謂存神中宫所以養胎元襲氣母之要也此又就形器而言中亦猶北極在天之中居其所而爲玄渾之樞紐則所謂中者於是乎有以寓而可見矣然樞紐之所以處而元化之所以不息者又實賴乎中而後能也若見得徹則横說堅說皆在其中矣谷神不死是謂玄牝谷神者謂其體之虚而無所不受而其用則應而不可測也以其綱紀造化流行古今妙乎萬物而生生不息故曰不死此即眞一之精陰陽之主故曰玄牝此言理寓於氣而玄陽也牝陰也蓋陽變而玄妙莫測陰合而生生不窮故也又公曰至妙之理而有生生之意焉程子所以取此說玄牝之門是謂天地根門猶衆妙之門天地萬物皆從此出根猶草木之根人所不可見而實爲生生之本謂陰陽之闔闢而爲天地之本也其在人身則元宫牝府乃神炁之要會天地同根者也曹道冲曰玄者杳冥而藏神牝者冲和而藏炁也綿綿若存用之不勤曹曰綿者冲和不絶之謂也道貴無迹謂之有則滯謂之無則頑故云若存文定曰綿綿微而不絶也若存存而不可見也能體此雖終日用之而不勞矣右六章河上名成象此章言道之體用炁之陰陽形之動靜而人則體之也蓋因玄牝之生生不已然後知谷神之不死因天地之動靜有常然後識玄牝之所爲而谷神以理言玄牝以氣言天地以形言蓋道之妙用不外乎陰陽而其所以然者則未嘗倚於陰陽乃宰制氣形而貫通無間者也或問靈樞經云天谷元神守之自眞上玄下牝子母相親及鼻爲玄吸炁而上通於天口爲牝納津而下通於地今皆不取其說何耶曰是則專局於人身而言也此章乃直從萬化原頭說起蓋此道宰御陰陽生育天地而即陰陽之宰爲人之性即天地之炁爲人之體故近取諸身此理實同自口鼻之說又轉而爲丹訣而後學因之爲說愈支離矣如張平叔云玄牝之門世罕知只憑口鼻妄施爲饒君吐納經千息爭得金烏搦兔兒薛道光云玄牝之門切要知幾人下手幾人疑君還不信長生理但去霜間看接黎朱眞人云玄牝之門號金母先天先地藏眞士含元抱息乃生成一炁虚無亘今古又云時人要識眞玄牝不在心兮不在腎窮取生身受炁初莫怪天機都漏盡吕純陽云玄牝之門不易言從來此處會坤乾呼爲玉室名通聖號曰金坑理會玄用似日魂投月魄來如海脉湧潮泉機關識破渾閑事萬里縱横一少年此雖於方術以爲至妙然宗㫖之論則序中巳發之矣列子曰黄帝書云云乃全載此一章蓋古有是書老子述而不作也而葛仙公内傳又曰黄帝時老君爲廣成子爲帝說此經故帝著書乃引此章天長地乆天地所以能長且乆者以其不自生故能長生不生者生之本故云生生者不生是也凡麗形數者必有限量今云天長地乆者特以人所見者言之耳是以聖人後其身而身先外其身而身存此屈己而忘我固非計私而爲利乃理勢之自然蓋牧謙而光忘形而壽非以其無私耶故能成其私天地不與物競生聖人不與人爭得所以大過人矣至公一理不可磨滅乃長乆也右七章河上名韜光此章明無我之㫖乃可乆之道也上善若水水善利萬物而不爭處衆人之所惡故幾於道處上聲惡去聲幾音機近也守柔處下乃俗之所惡而實近於道然麗乎形則於道有間故曰幾也居善地卑以自牧猶就下也心善淵淵靜而虚明此皆先存其體也蓋必有牧謙淵靜之德然後五者之功用所以行也與善仁與虚而不與盈澤博而不求報無私而已言善信誠信之言不待期而符契如潮汐之無爽及塞必止决必流鑑妍媸而不妄行險地而不失也政善治正容而物悟清靜而民化亦猶平中準而滌衆垢也事善能趨變任事各當其可猶隨器方圓任載輕重及避礙就通而不滯於一也動善時時行時止猶春泮而冬凝夫惟不爭故無尤矣有德有功而不爭乃德之至此其所以爲上善夫如是復何尤哉尤過也怨也右八章河上名易性此章以水喻上善明不爭之行也持而盈之不如其已揣而鋭之不可長保已音以止也揣初委切治也文定曰知盈之必溢而以持固之不若不盈之安也知鋭之必折而以揣先之不如揣之不可必恃也若夫聖人無積尚安有盈循理而行尚安有鋭無盈則無所用特無鋭則無所用揣矣金玉滿堂莫之能守富貴而驕自遺其咎功成名遂身退天之道遺唯季切貽也能體四時代謝之序亦可以見天道劉師立曰盈則必虚戒之在滿鋭則必鈍戒之在進金玉必累戒之在貪富貴易淫戒之在傲功成名遂必危在乎知止而不失其正此言深欲救人謂非必處山林絶人事然後可以入道雖居乎富貴功名之域皆可勤而行之右九章河上名運夷此章明脩身當體自然之理載營魄抱一能無離乎離平聲此資福延壽經所謂守煉精魄自然冲冲之意載乃登乘之義古文用字多有此例魄乃形魄精魄之謂營魄抱一猶衛形葆精之義蓋以魂御魄抱一而不離也專氣致柔能如嬰兒乎此襲氣母之義文公曰專非守之謂只是專一無間斷純純全全如嬰兒然了無知之之心則柔亦至矣蓋纔有一毫發露便是剛了滌除玄覽能無疵乎此洗心藏密之義滌洗也除遣也玄覽心照妙理也疵病也夫玄妙之見不除是爲解縛滌除之迹猶存是爲覺礙無疵則法愛忘而能所雙泯矣愛民治國能無爲乎此言推其緒餘以及人雖至於愛民治國一以芻狗遇之可也天門開闔能爲雌乎此言出入往來酬酢變化而主靜也天者自然之門開闔者變化之道雌靜者蓄養之德爲雌或作無雌謂雌靜而不滯於靜乃無雌也或云無雌乃無陰邪以間之也明白四達能無知乎此寂感無邊方也文定曰蓋是心無所不知而未嘗有能知之心夫心一而已苟又有知之之心則是二也上三者言精氣神則修身之事也乃存體以致用謂盡己之性以至於命而極其大而化之之地也下三者言其用效則治人之事也乃即用以歸體盡人物之性而見諸事業之間乃至與天爲徒而精神四達上下並流故功參化育而不居以大其無我之公此聖人之能事大道之玄功也所以下文乃申言之生之畜之生而不有爲而不恃長而不宰是謂玄德長上聲畜許六切養也潛被默通不自彰顯忘功忘物洞入冥極右十章河上名能爲此章爲說不一如劉涇曰黄帝云動以營生謂之魂碧虚曰營魂也白虎通云營營不定貌也載乘也謂使形常乘載魂魄抱守太和純一之氣令無散離也文定曰聖人性定而神凝不爲物遷雖以魄爲舍而神欲行魄無不從則神常載魄矣衆人以物役性神昏而不治則神聽於魄耳目用於聲色口鼻勞於臭味魄所欲行而神從之則魄常載神矣故教之以抱神載魄使兩者不相離也文公曰以車承人謂之載古今世俗之通言也以人登車亦謂之載則古文史類多有之如漢紀云劉章從謁者與載韓集云婦人以孺子載蓋皆此意營者字與熒同而爲晶明光炯之意其所謂魄亦若予論於九歌耳蓋以魂陽動而魄陰靜魂火二而魄水一謂以魂加魄以動守靜以火迫水以二守一而不相離如人登車而常載於其上則魂安靜而魄精明火不燥而水不溢固長生乆視之要也但爲之說者不能深考如河上公以營爲魂則固非字義而又并言人載魂魄之上以得生當愛養之則又失其文意獨其載字之義粗爲得之若王輔嗣以載爲處以營魄爲人所常居之處則亦河上之意至於近世而蘇子由王元澤之說出焉洪慶善亦謂陽氣充魄爲魂魂能運動則其生全矣而且皆以載爲以車承人之義矣是不惟非其文意且若此則是將使神常勞動而魄亦不得以少息雖幸免於物欲沉溺之累而窈冥之中精一之妙反爲强陽所挾以馳鶩於紛拏膠擾之塗卒以陷於衆人傷生損壽之域而不自知也九歌辯證或問魂魄之義曰子産有言物生始化曰魄旣生魄陽曰魂孔子曰氣也者神之威也魄也者鬼之盛也鄭氏註曰嘘吸出入者氣也耳目之精明爲魄氣則魂之謂也淮南子曰天氣爲魂地氣爲魄高誘註曰魂人陽神也魄人陰神也此數說者其於魂魄之義詳矣蓋嘗推之物生始化云者謂受形之初精血之聚其間有靈者名之曰魄也旣生魄陽曰魂者旣生此魄便有煖氣其間有神者名之曰魂也二者旣合然後有物易所謂精氣爲物者是也及其散也則魂遊而爲神魄降而爲鬼矣說者乃不考此而但據左疏之言其以神靈分陰陽者雖若有理但以嘘吸之動者爲魄則失之矣其言附形之靈附氣之神似亦近是又謂魄識少而魂識多則非也但有運用畜藏之異耳揚子雲又以曰月之光明論之則固以月之體質爲魄而日之光耀爲魂也謂日以其光加於月魄而爲之明如人登車而載於其上也故曰月未望則載魄于西旣望則終魄于東其遡於日乎言月之方生則以日之光加被於魄之西而漸滿其東以至於望而後圓及旣望矣則以日之光終守其魄之東而漸虧其西以至於晦而後盡蓋月遡日以爲明未望則曰在其右旣望則日在其左故各向其所在而受光如民向君之化而成俗此魂魄之說也三十輻共一轂當其無有車之用輻音福輪中凑轂衆竪木也轂古木切乃外受衆輻所會中空受軸以爲樞者當丁浪切即也無者空虚處也謂輻轂相凑以爲車即其中之虚然後有車之用文公曰無是轂中空處惟其空中故能受軸而運轉不窮莊子所謂樞始得其環中以應無窮亦此意也埏埴以爲器當其無有器之用埏始然切和土也埴市力切粘土也皆陶者之事此亦因其器中空無然後可以容物乃爲有用之器下意同鑿户牖以爲室當其無有室之用鑿穿也半門曰户門旁窗曰牖故有之以爲利無之以爲用是三者皆於外有以成形中虚而受物外有者適時之利中虚者眞常之用非無則有無以施其利非有則無無以致其用是故形神相資有無相以而宰形御氣者常無此所以妙化萬有而利用不窮焉易曰乾坤毁則無以見易易不可見則乾坤或幾乎息矣亦此意也右十一章河上名無用此章明有無相資之妙用以遣其二邊取捨之惑五色令人目盲五音令人耳聾五味令人口爽令並平聲使也爽失也謂失恬淡之眞味馳騁田獵令人心發狂是氣也而反動其心雖志之動氣常十九然此章所言皆由外而惑我者故告之制於外以安其内難得之貨令人行妨行去聲難得之貨皆外物也妨謂傷害也心愛外物則於善行有所妨也是以聖人爲腹不爲目故去彼取此去口舉切撤也此除去之去非去來之去腹者有容於内而無欲目者逐見於外而誘内爲腹猶易艮背之義不爲目猶陰符機在曰之說也右十二章河上名儉欲此章明染塵逐境皆失其正蓋前章言虚中之妙用無窮故此則戒其不可爲外邪所實也而其要則在於目是以始終言之如六根六塵眼色亦居其首夫子四勿必先曰視皆此意也然目必視耳必聽口必味形必役心必感是不可必靜惟動而未嘗離靜則雖動而不著於物乃湛然無欲矣寵辱若驚貴大患若身得爲寵失爲辱二者皆若驚謂不能以自安也貴顯與患難二者皆若身之不可辭何謂寵辱寵爲下寵爲辱本因寵然後有辱故曰爲下得之若驚失之若驚是謂寵辱若驚不以其道則必爲得失累其心故若驚也何謂貴大患若身吾所以有大患者爲吾有身及吾無身吾有何患爲去聲此又言身爲貴患之本無身即忘我也前不及辱此不及貴乃互文以見意亦以人莫不好貴而惡患故獨以患言此蓋由有我見存焉苟能無我則素富貴行乎富貴素患難行乎患難夷險不二苦樂一等則誰更受貴與患哉故貴以身爲天下若可寄天下愛以身爲天下若可託天下郭象曰若夫輕身以赴利棄我而徇物則身且不能安其如天下何蓋謂必能貴愛其身然後可任以天下而貴不及愛之深寄不若託之乆或云知貴愛其身則能外天下矣右十三章河上名厭恥此章明去妄情而復正性也謂遺寵則辱不及忘身而患不至天下大物也且不以爲累况於他物乎而忘身者方外之學也能貴愛其身而不以天下爲累者黄屋非心者也視之不見名曰夷大象平夷無色可見聽之不聞名曰希大音希聲寂不可聽搏之不得名曰微摶伯各切微妙無形虚不可執此三者不可致詰故混而爲一詰契吉切夫道非視聽智力之所能及要必歸於一而後可爾其上不皦其下不昧皦古曉切明也謂在上不加明而在下不加晦繩繩兮不可名復歸於無物雖繩然有條運而不絶然實無物之可名是謂無狀之狀無象之象是謂恍惚文定曰狀其著也象其微也惟非有非無而有無不可以定名故曰恍惚迎之不見其首隨之不見其後惟其非形色而周流無端所以不可得而隨迎執古之道以御今之有能知古始是謂道紀時有古今道無終始聖人教人體道以治身御物謂即其物之有而原其始之無者則得其本而統之有宗矣右十四章河上名贊玄此章言道體之沖妙如此若夫聞不出聲見不超色者荀非迷己著物則必棄有著無故反覆發明其不即不離之㫖而使人深造以自得之也古之善爲士者微妙玄通深不可識又定曰粗盡而微微極而妙妙極而玄玄則無所不通而深不可測夫惟不可識故彊爲之容豫兮若冬涉川彊上聲豫者圖患於未然逡巡如不得已愼之至也猶兮若畏四鄰猶者致疑於已事蓋建德若偷退藏於密戒之深也儼若客文公曰儼若客語意最精今本多誤作容殊失本㫖况此七句而三協韻以客協釋脗若符契又此凡言若某者皆有事物之實所謂客者亦曰不敢爲主而無與於事故其容儼然耳涣若冰將釋外端莊而内寬裕涣然不凝於物也敦兮其若樸質素渾厚圭角不露曠兮其若谷寬而有容虚而能應渾兮其若濁渾與混同和光同塵淈泥揚波冥乎至道孰能濁以靜之徐清孰能安以動之徐生以物汩性者惟靜以澄之則本然之清明者徐自復矣住於寂滅者惟安而能遷則不滯於一隅而徐自生矣所以活潑潑地而動靜兩忘也保此道者不欲盈夫惟不盈故能弊不新成御註曰大白若辱盛德若不足牧謙終節人之所難故又戒其矜滿之心其㫖深矣惟無自滿之心故能常守其弊而不自有其新成之功右十五章河上名顯德此章句句有序以主於成而若敝則盡矣如列子居鄭圃四十年無人識者便是這樣子審若西晋之風又烏有此氣象哉致虚極守靜篤虚靜兼忘是謂篤極萬物並作吾以觀其復夫物芸芸各歸其根芸芸者動出之貌虚乃實之根靜乃動之根謂萬物皆作於性皆復於性歸根曰靜靜曰復命夫靜天性也乃命於我者如是而已及乎感物則動矣惟動靜兩忘則動未嘗離靜而復其本然之天矣又定曰苟未能自復於性雖止動息念以求靜非靜也故惟歸根然後爲靜命者性之妙也易謂窮理盡性以至於命是也復命曰常物未有能常者惟至於命則湛然常存矣知常曰明悟乎此則明亦至矣不知常妄作凶即昧乎此則縁物而動皆妄也其凶可知知常容徹見本元則差别混融通塞非礙何所不容哉容乃公尚誰私乎公乃王文定曰天下將往歸之矣王乃天黄茂材曰王者與天爲徒天乃道天法道也文定曰天猶有形至於道則極矣道乃乆没身不殆劉涇曰所謂自古固存也右十六章河上名歸根此章謂悟此道則能虚能靜與道同體太上下知有之大朴上古之時上如標枝民如野鹿是也其次親之譽之此以仁義結人者也其次畏之侮之此以智力服人者也故信不足有不信吾誠自信則以道御天下足矣惟自信之誠不足而後申之以勸賞重之以刑政而民始有不信之心矣猶兮其貴言功成事遂百姓皆曰我自然希言自然而民服無爲之化則大古之治可復故曰聲色之於化民末也右十七章河上名淳風此章贊太古無爲之化而警風俗之日下也大道廢有仁義智慧出有大僞六親不和有孝慈國家昏亂有忠臣大道之隆仁義之實隱然於其中而民不知所謂純樸不殘孰爲犧樽是也然犧樽亦豈離純樸而别爲一物哉特其智慧已出而詐僞亦由是而滋矣文定曰堯非不孝而獨稱舜無瞽叟也伊周非不忠而獨稱龍逄比干無桀紂也右十八章河上名俗薄此章蓋深憫世道之不古也絶聖棄智民利百倍惟不居其聖則絶無自聖之心去小智則大智明故使民各安其性命之情而其利博矣絶仁棄義民復孝慈夫仁義之實本爲孝慈惟假其名而忘其實則其本迷矣故欲棄絶其迹而復其良知良能之初則仁義之實可不言而盡矣絶巧棄利盜賊無有文定曰巧所以便事也利所以濟物也二者非以爲盜而盜賊不得則無以行此三者以爲文不足故令有所屬令平聲屬之欲切聖智仁義巧利此三者皆道中之事由後世徒徇其名用之以爲文飾而内誠不足乃專以智力持世豈足爲善治哉至於末流必有不勝其害者矣故令反其本而有所統屬則天下之民各復其性矣所謂有事不足以取天下及我無爲而民自化云云是矣見素抱樸少私寡欲見賢遍切此乃屬之之地棄絶之機要也右十九章河上名還淳此章尊素朴之風去私欲之累則其利博矣陰符經云絶利一源用師十倍是也或云絶者非去絶之絶乃極其至而人不可及之謂也必有絶聖然後能棄私智下意同絶學無憂得道忘詮釋然無累唯之與阿相去幾何唯維水切聲順而恭譍也阿鳥何切聲高而慢譍也善之與惡相去何若人之所畏不可不畏若未至乎絶學之地當知此心寂然無爲於善惡未發之時乃渾然之本體至正至善者也及乎趨善向惡皆爲動也然有是身不能不感故當致察於感物而動之時謂恭與善則原於理義之正而慢與惡則汩於形氣之私其於二者之間相去不容以髪而天理人欲分焉惟欲易流人莫不然是不可不畏也茍能於此察之精而擇之審守之固而養之熟乃至於動而無動靜而無靜則雖感應無窮而湛然虚明者自若乃純乎天理了無對待則慢與惡何有哉荒兮其未央哉荒大而莫知其畔岸則是未嘗倚乎恭慢之一偏也衆人熙熙如享太牢如登春臺我獨怕兮其未兆若嬰兒之未孩怕白各切靜也心目所經外境方盛隨時逐物而不知其非惟上聖徹見其妄遇之漠然不動如嬰兒之未至提孩心無所著故也乘乘兮若無所歸曹曰乘萬物而遊無所係累也衆人皆有餘我獨若遺遺忘也蓋有若無也我愚人之心也哉純純兮御註曰天機不張而默與道契兹謂大智俗人昭昭我獨若昏俗人察察我獨悶悶昭昭光耀目衒也若昏謂不分别也察察明而不容貌悶叶音莫奔切寬裕貌澹兮其若海飂兮似無所止飂力幽切如長風飄揚之狀夫淵靜容物乃混然之全體變動不居乃大用之流行衆人皆有以我獨頑且鄙以用也頑然無知也鄙野也人皆知有用之用而莫知無用之用也我獨異於人而貴食於母文定曰道者萬物之母衆人徇物忘道而聖人脱遺萬物以道爲宗如嬰兒求食於母也右十章河上名異俗此章首示絶以立標復舉諭以明理次格凡聖以對辯終論獨行以返宗也或曰唯阿同出於聲善惡同出於爲達人大觀本實非異正如臧穀亡羊之意也此故太上忘情是非俱泯者之所爲然學者直須於善惡不可名處著眼始得若直以爲善與惡同耳則是任天下入於惡而不之顧豈理也哉道德眞經集解卷之一
